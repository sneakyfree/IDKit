---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idkit-celery-worker
  namespace: idkit
  labels:
    app: idkit
    component: celery-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: idkit
      component: celery-worker
  template:
    metadata:
      labels:
        app: idkit
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: idkit/api:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.workers", "worker", "-l", "info", "-c", "4"]
          envFrom:
            - configMapRef:
                name: idkit-config
            - secretRef:
                name: idkit-secrets
          env:
            - name: CELERY_WORKER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idkit-celery-beat
  namespace: idkit
  labels:
    app: idkit
    component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idkit
      component: celery-beat
  template:
    metadata:
      labels:
        app: idkit
        component: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: idkit/api:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.workers", "beat", "-l", "info"]
          envFrom:
            - configMapRef:
                name: idkit-config
            - secretRef:
                name: idkit-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: idkit-celery-worker-hpa
  namespace: idkit
  labels:
    app: idkit
    component: celery-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: idkit-celery-worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
