---
# Kustomization file for managing all Kubernetes resources
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: idkit

namespace: idkit

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - database-deployment.yaml
  - api-deployment.yaml
  - frontend-deployment.yaml
  - celery-deployment.yaml
  - gpu-workers-deployment.yaml
  - ingress.yaml
  - monitoring.yaml

commonLabels:
  app: idkit
  managed-by: kustomize

images:
  - name: idkit/api
    newTag: latest
  - name: idkit/frontend
    newTag: latest
  - name: idkit/gpu-worker-avatar
    newTag: latest
  - name: idkit/gpu-worker-voice
    newTag: latest
  - name: idkit/gpu-worker-llm
    newTag: latest
