---
apiVersion: v1
kind: ConfigMap
metadata:
  name: idkit-config
  namespace: idkit
  labels:
    app: idkit
data:
  # Application settings
  APP_NAME: "IDKit"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"

  # API settings
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"

  # Database
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"

  # Redis
  REDIS_DB: "0"

  # Storage
  S3_REGION: "us-east-1"

  # Model settings
  MODEL_CACHE_DIR: "/app/cache/models"

  # GPU Worker settings
  GPU_JOB_QUEUE: "gpu_jobs"
  GPU_JOB_TIMEOUT: "600"
  GPU_HEARTBEAT_INTERVAL: "30"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: idkit-nginx-config
  namespace: idkit
  labels:
    app: idkit
data:
  nginx.conf: |
    upstream api {
        server idkit-api:8000;
    }

    upstream frontend {
        server idkit-frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # API routes
        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket routes
        location /ws {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Frontend routes
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
