apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - prometheus.yaml
  - grafana.yaml
  - alertmanager.yaml

commonLabels:
  app.kubernetes.io/part-of: idkit-monitoring

# Patch for production secrets - replace with sealed secrets
patches:
  - patch: |-
      - op: replace
        path: /stringData/admin-password
        value: ${GRAFANA_ADMIN_PASSWORD}
    target:
      kind: Secret
      name: grafana-secrets
