---
# NOTE: In production, use sealed-secrets or external-secrets-operator
# This file is a template - actual values should never be committed
apiVersion: v1
kind: Secret
metadata:
  name: idkit-secrets
  namespace: idkit
  labels:
    app: idkit
type: Opaque
stringData:
  # Database - replace with actual values
  DATABASE_URL: "postgresql://user:password@postgres:5432/idkit"

  # Redis
  REDIS_URL: "redis://:password@redis:6379/0"

  # JWT
  JWT_SECRET_KEY: "REPLACE_WITH_SECURE_SECRET"

  # OAuth Providers
  GOOGLE_CLIENT_ID: "REPLACE_ME"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME"
  APPLE_CLIENT_ID: "REPLACE_ME"
  APPLE_CLIENT_SECRET: "REPLACE_ME"

  # AI Providers
  OPENAI_API_KEY: "REPLACE_ME"
  HEYGEN_API_KEY: "REPLACE_ME"
  ELEVENLABS_API_KEY: "REPLACE_ME"

  # AWS/S3
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  S3_BUCKET_NAME: "idkit-storage"

  # Social Platforms
  YOUTUBE_CLIENT_ID: "REPLACE_ME"
  YOUTUBE_CLIENT_SECRET: "REPLACE_ME"
  INSTAGRAM_APP_ID: "REPLACE_ME"
  INSTAGRAM_APP_SECRET: "REPLACE_ME"
  TIKTOK_CLIENT_KEY: "REPLACE_ME"
  TIKTOK_CLIENT_SECRET: "REPLACE_ME"
  TWITTER_CLIENT_ID: "REPLACE_ME"
  TWITTER_CLIENT_SECRET: "REPLACE_ME"
  FACEBOOK_APP_ID: "REPLACE_ME"
  FACEBOOK_APP_SECRET: "REPLACE_ME"
  LINKEDIN_CLIENT_ID: "REPLACE_ME"
  LINKEDIN_CLIENT_SECRET: "REPLACE_ME"

  # GPU Providers
  VASTAI_API_KEY: "REPLACE_ME"
  RUNPOD_API_KEY: "REPLACE_ME"
  LAMBDA_API_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: idkit-worker-secrets
  namespace: idkit-gpu
  labels:
    app: idkit
    component: gpu-worker
type: Opaque
stringData:
  WORKER_API_KEY: "REPLACE_WITH_WORKER_API_KEY"
  BACKEND_URL: "http://idkit-api.idkit.svc.cluster.local:8000"
  REDIS_URL: "redis://:password@redis.idkit.svc.cluster.local:6379/0"
