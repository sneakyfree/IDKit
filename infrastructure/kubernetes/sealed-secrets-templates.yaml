---
# IDKit Sealed Secrets Examples
#
# These are TEMPLATE files. To create actual sealed secrets:
#
# 1. Install kubeseal CLI:
#    brew install kubeseal  # macOS
#    # or download from https://github.com/bitnami-labs/sealed-secrets/releases
#
# 2. Create a plain secret:
#    kubectl create secret generic idkit-secrets \
#      --namespace=idkit \
#      --from-literal=database-url="postgresql://..." \
#      --from-literal=stripe-secret-key="sk_live_..." \
#      --dry-run=client -o yaml > plain-secret.yaml
#
# 3. Seal the secret:
#    kubeseal --format yaml < plain-secret.yaml > idkit-sealed-secrets.yaml
#
# 4. Apply the sealed secret (safe to commit to git!):
#    kubectl apply -f idkit-sealed-secrets.yaml
#
# The sealed secret is encrypted with the cluster's public key and can only
# be decrypted by the Sealed Secrets controller running in the cluster.
---
# Example Template for IDKit Application Secrets
# DO NOT commit actual secrets - this is just a template!
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: idkit-secrets
  namespace: idkit
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # These values need to be replaced with actual sealed values
    # Use: echo -n "value" | kubeseal --raw --namespace idkit --name idkit-secrets
    DATABASE_URL: "<SEALED_DATABASE_URL>"
    REDIS_URL: "<SEALED_REDIS_URL>"
    JWT_SECRET: "<SEALED_JWT_SECRET>"
    STRIPE_SECRET_KEY: "<SEALED_STRIPE_SECRET_KEY>"
    STRIPE_WEBHOOK_SECRET: "<SEALED_STRIPE_WEBHOOK_SECRET>"
    STRIPE_CONNECT_CLIENT_ID: "<SEALED_STRIPE_CONNECT_CLIENT_ID>"
    STRIPE_CONNECT_WEBHOOK_SECRET: "<SEALED_STRIPE_CONNECT_WEBHOOK_SECRET>"
    OPENAI_API_KEY: "<SEALED_OPENAI_API_KEY>"
    AWS_ACCESS_KEY_ID: "<SEALED_AWS_ACCESS_KEY_ID>"
    AWS_SECRET_ACCESS_KEY: "<SEALED_AWS_SECRET_ACCESS_KEY>"
    SENDGRID_API_KEY: "<SEALED_SENDGRID_API_KEY>"
  template:
    metadata:
      name: idkit-secrets
      namespace: idkit
      labels:
        app: idkit
        component: secrets
    type: Opaque
---
# Example Template for Grafana Secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-secrets
  namespace: monitoring
spec:
  encryptedData:
    admin-password: "<SEALED_GRAFANA_ADMIN_PASSWORD>"
    smtp-password: "<SEALED_SMTP_PASSWORD>"
  template:
    metadata:
      name: grafana-secrets
      namespace: monitoring
      labels:
        app: grafana
    type: Opaque
---
# Example Template for Database Credentials
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: idkit
spec:
  encryptedData:
    POSTGRES_USER: "<SEALED_POSTGRES_USER>"
    POSTGRES_PASSWORD: "<SEALED_POSTGRES_PASSWORD>"
    POSTGRES_DB: "<SEALED_POSTGRES_DB>"
  template:
    metadata:
      name: postgres-credentials
      namespace: idkit
      labels:
        app: postgres
    type: Opaque
