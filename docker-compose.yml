  #   volumes:
  #     - model_cache:/app/cache/models
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   depends_on:
  #     - api
  #   networks:
  #     - idkit-network

  # gpu-worker-llm:
  #   build:
  #     context: ./gpu-workers
  #     dockerfile: Dockerfile.llm
  #   container_name: idkit-gpu-llm
  #   command: python run_llm.py
  #   environment:
  #     - BACKEND_URL=http://api:8000
  #     - REDIS_URL=redis://:idkit_dev_password@redis:6379/0
  #     - WORKER_API_KEY=dev_worker_key
