  #   networks:
  #     - idkit-network

  # =============================================================================
  # Development Tools (enable with --profile dev-tools)
  # =============================================================================

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: idkit-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@idkit.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - idkit-network
    profiles:
      - dev-tools

  # Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: idkit-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:idkit_dev_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - idkit-network
    profiles:
      - dev-tools

  # Flower for Celery monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idkit-flower
    command: celery -A app.workers flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://:idkit_dev_password@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    networks:
      - idkit-network
    profiles:
      - dev-tools

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: idkit-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - idkit-network
    profiles:
      - dev-tools

# =============================================================================
# Networks
# =============================================================================

networks:
  idkit-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_cache:
  model_cache:
  pgadmin_data:
