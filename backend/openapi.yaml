openapi: 3.1.0
info:
  title: IDKit
  description: IDKit - AI-powered Influencer Development Kit
  version: 0.1.0
paths:
  /api/v1/health:
    get:
      summary: Api Health
      description: API v1 health check.
      operationId: api_health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Api Health Api V1 Health Get
  /api/v1/auth/google:
    get:
      tags:
      - Authentication
      summary: Google Login
      description: Initiate Google OAuth login.
      operationId: google_login_api_v1_auth_google_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/google/callback:
    get:
      tags:
      - Authentication
      summary: Google Callback
      description: Handle Google OAuth callback.
      operationId: google_callback_api_v1_auth_google_callback_get
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
          title: Code
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh Token
      description: Refresh access token using refresh token.
      operationId: refresh_token_api_v1_auth_refresh_post
      parameters:
      - name: refresh_token
        in: query
        required: true
        schema:
          type: string
          title: Refresh Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get Current User Info
      description: Get current authenticated user info.
      operationId: get_current_user_info_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      description: 'Logout user.


        Note: With JWT, logout is mainly handled client-side by removing tokens.

        This endpoint can be used to clear cookies if using cookie-based auth.'
      operationId: logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register
      description: Register a new account with email and password.
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: Login with email and password.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feed:
    get:
      tags:
      - Feed
      summary: Get Feed
      description: 'Get personalized feed.


        Feed types:

        - `for_you`: Personalized mix based on engagement and preferences

        - `following`: Posts only from users you follow

        - `trending`: Top trending posts

        - `discover`: New content discovery'
      operationId: get_feed_api_v1_feed_get
      security:
      - HTTPBearer: []
      parameters:
      - name: feed_type
        in: query
        required: false
        schema:
          type: string
          description: 'Feed type: for_you, following, trending, discover'
          default: for_you
          title: Feed Type
        description: 'Feed type: for_you, following, trending, discover'
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feed/following:
    get:
      tags:
      - Feed
      summary: Get Following Feed
      description: Get feed from followed users only (requires authentication).
      operationId: get_following_feed_api_v1_feed_following_get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feed/trending:
    get:
      tags:
      - Feed
      summary: Get Trending Feed
      description: Get trending posts.
      operationId: get_trending_feed_api_v1_feed_trending_get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/posts:
    post:
      tags:
      - Posts
      summary: Create Post
      description: Create a new post.
      operationId: create_post_api_v1_posts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__posts__PostResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/posts/{post_id}:
    get:
      tags:
      - Posts
      summary: Get Post
      description: Get a single post by ID.
      operationId: get_post_api_v1_posts__post_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__posts__PostResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Posts
      summary: Delete Post
      description: Delete a post (only by owner).
      operationId: delete_post_api_v1_posts__post_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/posts/{post_id}/like:
    post:
      tags:
      - Posts
      summary: Like Post
      description: Like a post.
      operationId: like_post_api_v1_posts__post_id__like_post
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Posts
      summary: Unlike Post
      description: Unlike a post.
      operationId: unlike_post_api_v1_posts__post_id__like_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/posts/{post_id}/comments:
    get:
      tags:
      - Posts
      summary: Get Comments
      description: Get comments for a post.
      operationId: get_comments_api_v1_posts__post_id__comments_get
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/app__api__v1__posts__CommentResponse'
                title: Response Get Comments Api V1 Posts  Post Id  Comments Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Posts
      summary: Add Comment
      description: Add a comment to a post.
      operationId: add_comment_api_v1_posts__post_id__comments_post
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__posts__CommentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/posts/{post_id}/save:
    post:
      tags:
      - Posts
      summary: Save Post
      description: Save a post to a collection.
      operationId: save_post_api_v1_posts__post_id__save_post
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      - name: collection
        in: query
        required: false
        schema:
          type: string
          default: Saved
          title: Collection
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Posts
      summary: Unsave Post
      description: Remove a post from saves.
      operationId: unsave_post_api_v1_posts__post_id__save_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Post Id
      - name: collection
        in: query
        required: false
        schema:
          type: string
          default: Saved
          title: Collection
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/profiles/me:
    get:
      tags:
      - Profiles
      summary: Get My Profile
      description: Get current user's profile.
      operationId: get_my_profile_api_v1_profiles_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__profiles__ProfileResponse'
      security:
      - HTTPBearer: []
    put:
      tags:
      - Profiles
      summary: Update My Profile
      description: Update current user's profile.
      operationId: update_my_profile_api_v1_profiles_me_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__profiles__ProfileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/profiles/{username}:
    get:
      tags:
      - Profiles
      summary: Get Profile
      description: Get a user's public profile by username.
      operationId: get_profile_api_v1_profiles__username__get
      security:
      - HTTPBearer: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          title: Username
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__profiles__ProfileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/profiles/{username}/posts:
    get:
      tags:
      - Profiles
      summary: Get User Posts
      description: Get posts from a user's profile (grid view).
      operationId: get_user_posts_api_v1_profiles__username__posts_get
      security:
      - HTTPBearer: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          title: Username
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostPreviewResponse'
                title: Response Get User Posts Api V1 Profiles  Username  Posts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/profiles/{username}/follow:
    post:
      tags:
      - Profiles
      summary: Follow User
      description: Follow a user.
      operationId: follow_user_api_v1_profiles__username__follow_post
      security:
      - HTTPBearer: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          title: Username
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Profiles
      summary: Unfollow User
      description: Unfollow a user.
      operationId: unfollow_user_api_v1_profiles__username__follow_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          title: Username
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/profiles/{username}/followers:
    get:
      tags:
      - Profiles
      summary: Get Followers
      description: Get a user's followers.
      operationId: get_followers_api_v1_profiles__username__followers_get
      security:
      - HTTPBearer: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          title: Username
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/profiles/{username}/following:
    get:
      tags:
      - Profiles
      summary: Get Following
      description: Get users that a user follows.
      operationId: get_following_api_v1_profiles__username__following_get
      security:
      - HTTPBearer: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          title: Username
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/media/upload-url:
    post:
      tags:
      - Media
      summary: Get Upload Url
      description: 'Get a presigned URL for direct upload to S3/MinIO.


        The client should use this URL to PUT the file directly.

        After upload, use the file_url in post creation.'
      operationId: get_upload_url_api_v1_media_upload_url_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/media/upload-urls:
    post:
      tags:
      - Media
      summary: Get Batch Upload Urls
      description: 'Get multiple presigned URLs for batch upload.


        Useful for carousel posts or multiple media attachments.'
      operationId: get_batch_upload_urls_api_v1_media_upload_urls_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUploadRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/media/download-url:
    get:
      tags:
      - Media
      summary: Get Download Url
      description: 'Get a presigned URL for downloading a file.


        Optional filename parameter forces download with that name.'
      operationId: get_download_url_api_v1_media_download_url_get
      security:
      - HTTPBearer: []
      parameters:
      - name: file_key
        in: query
        required: true
        schema:
          type: string
          description: S3 object key
          title: File Key
        description: S3 object key
      - name: filename
        in: query
        required: false
        schema:
          type: string
          description: Download filename
          title: Filename
        description: Download filename
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/media/files:
    delete:
      tags:
      - Media
      summary: Delete Media Files
      description: 'Delete media files from storage.


        Only files owned by the current user can be deleted.'
      operationId: delete_media_files_api_v1_media_files_delete
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteMediaRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMediaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Media
      summary: List User Files
      description: List media files for the current user.
      operationId: list_user_files_api_v1_media_files_get
      security:
      - HTTPBearer: []
      parameters:
      - name: folder
        in: query
        required: false
        schema:
          type: string
          description: Folder to list
          default: uploads
          title: Folder
        description: Folder to list
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
