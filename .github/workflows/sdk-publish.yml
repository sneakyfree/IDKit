name: SDK Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      language:
        description: 'SDK language to publish (or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - typescript
          - python
          - go
          - ruby

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  GO_VERSION: '1.21'

jobs:
  # =============================================================================
  # Generate OpenAPI Spec & SDKs
  # =============================================================================
  generate:
    name: Generate SDKs
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Export OpenAPI spec
        run: |
          cd backend
          python -c "
          from app.main import app
          import json
          spec = app.openapi()
          with open('openapi.json', 'w') as f:
              json.dump(spec, f, indent=2)
          "

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate all SDKs
        run: |
          cd backend
          pip install openapi-generator-cli || true
          python scripts/generate_sdk.py all \
            --version ${{ steps.version.outputs.version }} \
            --output ../sdks

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-sdks
          path: sdks/
          retention-days: 7

  # =============================================================================
  # Publish TypeScript SDK to npm
  # =============================================================================
  publish-typescript:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    needs: generate
    if: |
      github.event.inputs.language == 'all' ||
      github.event.inputs.language == 'typescript' ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download SDKs
        uses: actions/download-artifact@v4
        with:
          name: generated-sdks
          path: sdks/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: sdks/typescript
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # =============================================================================
  # Publish Python SDK to PyPI
  # =============================================================================
  publish-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    needs: generate
    if: |
      github.event.inputs.language == 'all' ||
      github.event.inputs.language == 'python' ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download SDKs
        uses: actions/download-artifact@v4
        with:
          name: generated-sdks
          path: sdks/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build and publish to PyPI
        working-directory: sdks/python
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # =============================================================================
  # Publish Go SDK
  # =============================================================================
  publish-go:
    name: Publish Go Module
    runs-on: ubuntu-latest
    needs: generate
    if: |
      github.event.inputs.language == 'all' ||
      github.event.inputs.language == 'go' ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download SDKs
        uses: actions/download-artifact@v4
        with:
          name: generated-sdks
          path: sdks/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify Go module
        working-directory: sdks/go
        run: |
          go mod tidy
          go vet ./...
          go test ./... || true

  # =============================================================================
  # Publish Ruby SDK
  # =============================================================================
  publish-ruby:
    name: Publish Ruby Gem
    runs-on: ubuntu-latest
    needs: generate
    if: |
      github.event.inputs.language == 'all' ||
      github.event.inputs.language == 'ruby' ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download SDKs
        uses: actions/download-artifact@v4
        with:
          name: generated-sdks
          path: sdks/

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Build and publish gem
        working-directory: sdks/ruby
        run: |
          gem build idkit.gemspec
          gem push idkit-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_TOKEN }}
